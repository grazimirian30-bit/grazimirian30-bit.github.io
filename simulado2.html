<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Simulado – Ética e Cidadania (Módulo 2)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background:#f4f6f8;
      margin:0;
      padding:20px;
    }
    .container {
      max-width:900px;
      margin:auto;
      background:white;
      padding:24px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
    }
    h1 { text-align:center; }
    .question { margin-bottom:28px; }
    .question h3 { margin-bottom:10px; }
    label { display:block; margin:6px 0; cursor:pointer; }
    button {
      padding:12px 24px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
    }
    button:hover { background:#1e4fd1; }
    .result {
      margin-top:24px;
      padding:16px;
      border-radius:12px;
      background:#eef2ff;
    }
    .explanation { margin-top:8px; font-size:14px; }
    .correct { color:#059669; font-weight:bold; }
    .wrong { color:#dc2626; font-weight:bold; }
    .tipo { font-size:13px; color:#6b7280; margin-bottom:6px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Simulado – Ética e Cidadania</h1>
  <p><strong>Módulo 2 | Nível banca</strong></p>

  <form id="quizForm"></form>

  <button onclick="corrigir()">Corrigir</button>

  <div id="resultado" class="result" style="display:none"></div>
</div>

<script>
const questoes = [
{
  tipo: "Asserção e razão",
  pergunta: "1. I. Ser profissional envolve responsabilidade social além da competência técnica.\n\nPORQUE\n\nII. A atuação profissional impacta diretamente a vida coletiva.",
  opcoes: [
    "As asserções I e II são verdadeiras, e a II justifica a I.",
    "As asserções I e II são verdadeiras, mas a II não justifica a I.",
    "A asserção I é verdadeira, e a II é falsa.",
    "A asserção I é falsa, e a II é verdadeira.",
    "As asserções I e II são falsas."
  ],
  correta: 0,
  explicacao: "A ética profissional existe porque o trabalho sempre produz impactos sociais."
},
{
  tipo: "Objetiva",
  pergunta: "2. No contexto da ética profissional, agir eticamente significa:",
  opcoes: [
    "Buscar vantagens pessoais a qualquer custo.",
    "Cumprir apenas metas financeiras.",
    "Considerar as consequências sociais das decisões.",
    "Ignorar normas institucionais."
  ],
  correta: 2,
  explicacao: "A ética profissional exige responsabilidade pelos efeitos das decisões."
},
{
  tipo: "Asserção e razão",
  pergunta: "3. I. As regras morais são importantes para a convivência social.\n\nPORQUE\n\nII. Elas orientam expectativas sobre comportamentos considerados adequados.",
  opcoes: [
    "As asserções I e II são verdadeiras, e a II justifica a I.",
    "As asserções I e II são verdadeiras, mas a II não justifica a I.",
    "A asserção I é verdadeira, e a II é falsa.",
    "A asserção I é falsa, e a II é verdadeira.",
    "As asserções I e II são falsas."
  ],
  correta: 0,
  explicacao: "As regras morais funcionam como referência de comportamento social."
},
{
  tipo: "Objetiva",
  pergunta: "4. Na sociedade tecnológica e digital, um dos principais desafios éticos é:",
  opcoes: [
    "Eliminar a comunicação online.",
    "Garantir privacidade e uso responsável das informações.",
    "Substituir todas as relações humanas por máquinas.",
    "Ignorar o impacto das redes sociais."
  ],
  correta: 1,
  explicacao: "A ética digital envolve proteção de dados e responsabilidade informacional."
},
{
  tipo: "Asserção e razão",
  pergunta: "5. I. O uso das tecnologias digitais exige reflexão ética.\n\nPORQUE\n\nII. As ações no ambiente virtual também produzem consequências reais.",
  opcoes: [
    "As asserções I e II são verdadeiras, e a II justifica a I.",
    "As asserções I e II são verdadeiras, mas a II não justifica a I.",
    "A asserção I é verdadeira, e a II é falsa.",
    "A asserção I é falsa, e a II é verdadeira.",
    "As asserções I e II são falsas."
  ],
  correta: 0,
  explicacao: "O ambiente digital também gera efeitos concretos na vida social."
},
{
  tipo: "Objetiva",
  pergunta: "6. Um comportamento antiético no ambiente profissional seria:",
  opcoes: [
    "Respeitar normas institucionais.",
    "Compartilhar dados sigilosos sem autorização.",
    "Agir com transparência.",
    "Cumprir responsabilidades assumidas."
  ],
  correta: 1,
  explicacao: "Quebrar confidencialidade é violação ética grave."
},
{
  tipo: "Asserção e razão",
  pergunta: "7. I. A cidadania digital envolve responsabilidade no uso das redes.\n\nPORQUE\n\nII. O ambiente virtual é parte da vida social contemporânea.",
  opcoes: [
    "As asserções I e II são verdadeiras, e a II justifica a I.",
    "As asserções I e II são verdadeiras, mas a II não justifica a I.",
    "A asserção I é verdadeira, e a II é falsa.",
    "A asserção I é falsa, e a II é verdadeira.",
    "As asserções I e II são falsas."
  ],
  correta: 0,
  explicacao: "A vida digital faz parte da cidadania hoje."
},
{
  tipo: "Objetiva",
  pergunta: "8. A profissionalização ética pressupõe principalmente:",
  opcoes: [
    "Apenas domínio técnico.",
    "Indiferença aos impactos sociais.",
    "Competência técnica aliada à responsabilidade.",
    "Busca exclusiva por lucro."
  ],
  correta: 2,
  explicacao: "Ser profissional ético vai além da técnica."
},
{
  tipo: "Asserção e razão",
  pergunta: "9. I. A tecnologia amplia possibilidades de comunicação.\n\nPORQUE\n\nII. Também aumenta a necessidade de critérios éticos no uso da informação.",
  opcoes: [
    "As asserções I e II são verdadeiras, e a II justifica a I.",
    "As asserções I e II são verdadeiras, mas a II não justifica a I.",
    "A asserção I é verdadeira, e a II é falsa.",
    "A asserção I é falsa, e a II é verdadeira.",
    "As asserções I e II são falsas."
  ],
  correta: 0,
  explicacao: "Mais tecnologia exige mais responsabilidade ética."
},
{
  tipo: "Objetiva",
  pergunta: "10. A ética na sociedade contemporânea busca principalmente:",
  opcoes: [
    "Separar indivíduo e sociedade.",
    "Orientar ações responsáveis em contextos complexos.",
    "Eliminar normas sociais.",
    "Priorizar apenas eficiência técnica."
  ],
  correta: 1,
  explicacao: "A ética orienta decisões responsáveis no mundo atual."
}
];

const form = document.getElementById('quizForm');

questoes.forEach((q, i) => {
  const div = document.createElement('div');
  div.className = 'question';

  let html = `<div class="tipo">Tipo: ${q.tipo}</div>`;
  html += `<h3>${q.pergunta.replace(/\n/g,'<br>')}</h3>`;

  q.opcoes.forEach((op, j) => {
    html += `
      <label>
        <input type="radio" name="q${i}" value="${j}"> ${op}
      </label>`;
  });

  html += `<div id="exp${i}" class="explanation"></div>`;
  div.innerHTML = html;
  form.appendChild(div);
});

function corrigir() {
  let acertos = 0;

  questoes.forEach((q, i) => {
    const marcada = document.querySelector(`input[name="q${i}"]:checked`);
    const exp = document.getElementById(`exp${i}`);

    if (!marcada) {
      exp.innerHTML = '<span class="wrong">⚠️ Não respondida</span>';
      return;
    }

    if (parseInt(marcada.value) === q.correta) {
      acertos++;
      exp.innerHTML = `<span class="correct">✔️ Correta.</span> ${q.explicacao}`;
    } else {
      exp.innerHTML = `<span class="wrong">❌ Errada.</span> ${q.explicacao}`;
    }
  });

  const res = document.getElementById('resultado');
  res.style.display = 'block';
  res.innerHTML = `<h2>Você acertou ${acertos} de ${questoes.length}</h2>`;
}
</script>
</body>
</html>
